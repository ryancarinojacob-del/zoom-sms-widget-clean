<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Zoom SMS Widget</title>
  <script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>
</head>

<body style="margin:0;">
  <div style="display:flex; flex-direction:column; height:100vh; font-family:Arial, sans-serif; background:#f5f7fa;">

    <!-- HEADER -->
    <div style="padding:12px; border-bottom:1px solid #ddd; background:#fff;">
      <div style="font-weight:bold; font-size:15px;">Zoom SMS</div>
      <div id="recordInfo" style="font-size:13px; color:#555; margin:6px 0;"></div>

      <input
        id="phone"
        type="text"
        style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px;"
        placeholder="+1XXXXXXXXXX"
      />

      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;">
        <button onclick="applyTemplate('intro')">Intro</button>
        <button onclick="applyTemplate('followup')">Follow-Up</button>
        <button onclick="applyTemplate('docs')">Request Docs</button>
        <button onclick="applyTemplate('received')">Docs Received</button>
        <button onclick="applyTemplate('birthday')">Birthday 🎉</button>
      </div>
    </div>

    <!-- CHAT -->
    <div id="conversation" style="flex:1; overflow-y:auto; padding:12px;">
      <div style="color:#777;">Loading conversation...</div>
    </div>

    <!-- INPUT -->
    <div style="border-top:1px solid #ddd; padding:10px; background:#fff;">
      <textarea
        id="smsMessage"
        rows="2"
        style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;"
        placeholder="Type a message..."
      ></textarea>

      <div style="display:flex; justify-content:space-between; margin-top:8px;">
        <div id="status" style="font-size:12px;"></div>
        <div style="display:flex; gap:8px;">
          <button onclick="loadConversation()">Refresh</button>
          <button id="sendBtn" onclick="sendSms()">Send</button>
        </div>
      </div>
    </div>

  </div>

<script>
let currentRecordId = "";
let currentModule = "";
let currentRecipientName = "";
let currentRecipientFirstName = "";
let currentContactId = "";
let currentDealId = "";

const SEND_SMS_URL = "/api/send-sms";
const ZOOM_FROM_NUMBER = "+15873333519";
const SMS_LOGS_MODULE = "SMS_Logs";

const TEMPLATES = {
  intro: "Hi {{firstName}}, this is Ryan Jacob from Verico Compass Mortgage Group.",
  followup: "Hi {{firstName}}, just following up on your mortgage file.",
  docs: "Hi {{firstName}}, please send your requested documents.",
  received: "Hi {{firstName}}, I’ve received your documents.",
  birthday: "Happy Birthday {{firstName}}! 🎉 – Ryan"
};

function normalizePhone(phone) {
  if (!phone) return "";
  const digits = String(phone).replace(/\D/g, "");
  if (digits.length === 10) return "+1" + digits;
  if (digits.length === 11 && digits.startsWith("1")) return "+" + digits;
  return "+" + digits;
}

function escapeHtml(v) {
  return String(v || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function setStatus(msg, err) {
  const el = document.getElementById("status");
  el.innerText = msg || "";
  el.style.color = err ? "red" : "green";
}

function setSendingState(s) {
  const btn = document.getElementById("sendBtn");
  btn.disabled = s;
  btn.innerText = s ? "Sending..." : "Send";
}

function fillTemplate(t) {
  return t.replace(/{{firstName}}/g, currentRecipientFirstName || "there");
}

function applyTemplate(k) {
  document.getElementById("smsMessage").value = fillTemplate(TEMPLATES[k]);
}

function normalizeDirection(log) {
  const d = (log.Direction || "").toLowerCase();
  if (d.includes("incoming")) return "incoming";
  if (d.includes("outgoing")) return "outgoing";
  return "unknown";
}

function renderConversation(logs) {
  const c = document.getElementById("conversation");

  if (!logs || logs.length === 0) {
    c.innerHTML = "<div>No messages</div>";
    return;
  }

  logs.sort((a,b)=> new Date(a.Created_Time) - new Date(b.Created_Time));

  let html = "";

  for (const log of logs) {
    const isOut = normalizeDirection(log) === "outgoing";
    html += `
      <div style="display:flex; justify-content:${isOut?"flex-end":"flex-start"}; margin-bottom:6px;">
        <div style="
          max-width:70%;
          padding:10px;
          border-radius:18px;
          background:${isOut?"#007aff":"#fff"};
          color:${isOut?"#fff":"#000"};
        ">
          ${escapeHtml(log.Message_Text)}
        </div>
      </div>
    `;
  }

  c.innerHTML = html;
  c.scrollTop = c.scrollHeight;
}

function appendTemporaryMessage(message) {
  const c = document.getElementById("conversation");

  c.innerHTML += `
    <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
      <div style="background:#007aff;color:#fff;padding:10px;border-radius:18px;opacity:0.7;">
        ${escapeHtml(message)}
        <div style="font-size:10px;">Sending...</div>
      </div>
    </div>
  `;

  c.scrollTop = c.scrollHeight;
}

async function sendSms() {
  const msg = document.getElementById("smsMessage").value.trim();
  const to = normalizePhone(document.getElementById("phone").value);

  if (!msg || !to) return;

  appendTemporaryMessage(msg);

  setSendingState(true);

  const res = await fetch(SEND_SMS_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      module:currentModule,
      recordId:currentRecordId,
      to,
      message:msg,
      fromNumber:ZOOM_FROM_NUMBER
    })
  });

  const data = await res.json();

  setSendingState(false);
  document.getElementById("smsMessage").value = "";

  setTimeout(loadConversation, 1200);
}

async function loadConversation() {
  const r = await ZOHO.CRM.API.searchRecord({
    Entity: SMS_LOGS_MODULE,
    Type: "criteria",
    Query: "(Related_Contact:equals:" + currentRecordId + ")"
  });

  renderConversation(r.data || []);
}

ZOHO.embeddedApp.on("PageLoad", function(data){
  currentRecordId = data.EntityId;
  currentModule = data.Entity;
  loadConversation();
});

ZOHO.embeddedApp.init();
</script>

</body>
</html>
